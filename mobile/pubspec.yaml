name: mobile
description: ProjectFlow — Suivi des projets et performance des équipes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ═══ Navigation ═══
  go_router: ^13.2.0

  # ═══ State Management ═══
  flutter_bloc: ^8.1.4
  bloc: ^8.1.3
  equatable: ^2.0.5

  # ═══ HTTP & API ═══
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # ═══ Stockage sécurisé (JWT token) ═══
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ═══ Injection de dépendances ═══
  get_it: ^7.6.7
  injectable: ^2.3.2

  # ═══ Graphiques KPI ═══
  fl_chart: ^0.68.0

  # ═══ UI Components ═══
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.0

  # ═══ Formulaires ═══
  reactive_forms: ^17.0.1

  # ═══ Dates & Formatage ═══
  intl: 0.20.2
  timeago: ^3.6.1

  # ═══ Notifications ═══
  flutter_local_notifications: ^17.1.2

  # ═══ WebSocket ═══
  stomp_dart_client: ^0.4.4

  # ═══ Export PDF ═══
  pdf: ^3.10.8
  printing: ^5.12.0

  # ═══ Export CSV / Rapports ═══
  csv: ^6.0.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # ═══ Import de fichiers ═══
  file_picker: ^8.0.7

  # ═══ Permissions ═══
  permission_handler: ^11.3.1

  # ═══ Icônes ═══
  iconsax: ^0.0.8

  # ═══ Connectivity ═══
  connectivity_plus: ^6.0.3

  # ═══ Google Sign-In ═══
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  injectable_generator: ^2.4.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/