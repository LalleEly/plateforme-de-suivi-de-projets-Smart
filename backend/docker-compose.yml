# docker-compose.yml — ProjectFlow
# Lance : docker-compose up -d

version: '3.8'

services:

  # ═══ PostgreSQL ═══
  postgres:
    image: postgres:15-alpine
    container_name: projectflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectflow
      POSTGRES_USER: projectflow_user
      POSTGRES_PASSWORD: projectflow2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - projectflow-network

  # ═══ pgAdmin (interface visuelle DB) ═══
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: projectflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@projectflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - projectflow-network

volumes:
  postgres_data:

networks:
  projectflow-network:
    driver: bridge
